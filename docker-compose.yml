services:
  white-rabbit:
    build:
      context: .
      dockerfile: src/Nordray.WhiteRabbit.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - WhiteRabbit_Database__ConnectionString=Data Source=/data/white-rabbit.db
      - WhiteRabbit_Dex__IssuerUrl=http://white-rabbit:8080
      - WhiteRabbit_Dex__InternalAddress=http://dex:5556
      - WhiteRabbit_Dex__ClientId=white-rabbit
      - WhiteRabbit_Dex__ClientSecret=${DEX_WHITE_RABBIT_CLIENT_SECRET:?DEX_WHITE_RABBIT_CLIENT_SECRET must be set}
      - WhiteRabbit_Mailjet__ApiKey=${MAILJET_API_KEY:-}
      - WhiteRabbit_Mailjet__SecretKey=${MAILJET_SECRET_KEY:-}
      - WhiteRabbit_Mailjet__FromEmail=${MAILJET_FROM_EMAIL:-noreply@example.com}
    volumes:
      - ./data/white-rabbit:/data
    depends_on:
      - dex
      - mailpit

  example-client:
    build:
      context: examples/ExampleClient
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_URLS=http://+:8081
      - WhiteRabbit__BaseUrl=http://localhost:8080
      - WhiteRabbit__ProxyBaseUrl=http://white-rabbit:8080
      - Oidc__ClientId=example-client
      - Oidc__ClientSecret=${DEX_EXAMPLE_CLIENT_SECRET:?DEX_EXAMPLE_CLIENT_SECRET must be set}
    depends_on:
      - white-rabbit

  dex:
    image: dexidp/dex:v2.41.1
    ports:
      - "5556:5556"
    environment:
      - DEX_WHITE_RABBIT_CLIENT_SECRET=${DEX_WHITE_RABBIT_CLIENT_SECRET:?DEX_WHITE_RABBIT_CLIENT_SECRET must be set}
      - DEX_EXAMPLE_CLIENT_SECRET=${DEX_EXAMPLE_CLIENT_SECRET:?DEX_EXAMPLE_CLIENT_SECRET must be set}
    volumes:
      - ./deploy/dex/config.yaml:/etc/dex/config.yaml:ro
      - ./data/dex:/data
    command: ["dex", "serve", "/etc/dex/config.yaml"]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
