services:
  white-rabbit:
    build:
      context: .
      dockerfile: src/Nordray.WhiteRabbit.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Database__ConnectionString=Data Source=/data/white-rabbit.db
      - Dex__IssuerUrl=http://dex:5556
      - Dex__ClientId=white-rabbit
      - Dex__ClientSecret=change-me-in-production
      - Mailjet__ApiKey=${MAILJET_API_KEY:-}
      - Mailjet__SecretKey=${MAILJET_SECRET_KEY:-}
      - Mailjet__FromEmail=${MAILJET_FROM_EMAIL:-noreply@example.com}
      # Override with real credentials for production:
      # - WHITE_RABBIT_BUNNY_ACCOUNT_API_KEY=...
      # - WHITE_RABBIT_BUNNY_STREAM_API_KEY=...
      # - WHITE_RABBIT_BUNNY_STORAGE_PASSWORD=...
    volumes:
      - ./data/white-rabbit:/data
    depends_on:
      - dex
      - mailpit

  dex:
    image: dexidp/dex:v2.41.1
    ports:
      - "5556:5556"
    volumes:
      - ./deploy/dex/config.yaml:/etc/dex/config.yaml:ro
      - ./data/dex:/data
    command: ["dex", "serve", "/etc/dex/config.yaml"]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
